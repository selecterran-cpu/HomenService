let _smsPage = 'skb';

function openSmsModal(page) {
  const text = page === 'ca' ? buildCaText() : buildSkbText();
  navigator.clipboard.writeText(text).then(() =&gt; {
    showToast('복사되었습니다! 문자에 붙여넣기 하세요 😊');
  }).catch(() =&gt; {
    // fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('복사되었습니다! 문자에 붙여넣기 하세요 😊');
  });
}

function showToast(msg) {
  let t = document.getElementById('copy-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'copy-toast';
    t.style.cssText = `
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,.8); color:#fff; padding:12px 22px;
      border-radius:24px; font-size:14px; font-weight:600;
      z-index:999; white-space:nowrap; transition:opacity .3s;
    `;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() =&gt; t.style.opacity = '0', 2500);
}

  else if(g==='stb'){

    if(movingOn &amp;&amp; card.dataset.id !== 's3mini'){ movingOn=false; updateMovingUI(); renderGifts(); }

  else if(g==='extrastb'){extraStbType=card.dataset.type||'none'; extraStbQty=extraStbType!=='none'?1:0; if(extraStbType==='none'){extraStbCh='none';document.querySelectorAll('[data-g=&quot;extrastb-ch&quot;]').forEach(c=&gt;c.classList.remove('sel'));}}
  else if(g==='extrastb-ch'){extraStbCh=card.dataset.ch||'none';}
  calc();
});

function calcCa(){
  const i = caCidx();
  const _caAlone = (window.adminCfg?.caAlone) ? window.adminCfg.caAlone : caAlone;
  const _caCombo  = (window.adminCfg?.caCombo)  ? window.adminCfg.caCombo  : caCombo;
  const _inetAlone = (window.adminCfg?.inetAlone) ? window.adminCfg.inetAlone : inetAlone;
  const _inetCombo  = (window.adminCfg?.inetCombo)  ? window.adminCfg.inetCombo  : inetCombo;
  const _caBaroDisc = (window.adminCfg?.caBaroDisc) ? window.adminCfg.caBaroDisc : null;
  const _caMobDisc  = (window.adminCfg?.caMobDisc)  ? window.adminCfg.caMobDisc  : null;
  const _caExtFee   = (window.adminCfg?.caExtraStbFee) ? window.adminCfg.caExtraStbFee : caExtraStbFee;
  const _ansimFee   = (window.adminCfg?.ansimFee !== undefined) ? window.adminCfg.ansimFee : 2200;

  const prodCostAlone = caProd!=='none' ? _caAlone[caProd][i] : 0;
  const prodCostCombo = caProd!=='none' ? _caCombo[caProd][i] : 0;
  const inetBaseCA = caInet!=='none' ? _inetAlone[caInet][i] : 0;
  const inetComboCA = caInet!=='none' ? _inetCombo[caInet][i] : 0;
  const lanWifiSurchargeCA = (caInet==='lan' &amp;&amp; caWifi!=='none' &amp;&amp; caComboOn &amp;&amp; !caMobOn) ? 1100 : 0;
  const caInetComboDisc = caComboOn &amp;&amp; !caMobOn &amp;&amp; caInet!=='none' &amp;&amp; caProd!=='none' ? (inetBaseCA - inetComboCA) : 0;
  const caProdComboDisc = caComboOn &amp;&amp; !caMobOn &amp;&amp; caProd!=='none' ? (prodCostAlone - prodCostCombo) : 0;
  const caComboDisc = caInetComboDisc + caProdComboDisc - lanWifiSurchargeCA;
  const inetCost = inetBaseCA;
  const prodCost = prodCostAlone;
  const wifiCost = (caWifi!=='none') ? ((window.adminCfg?.wifiAdd?.[caWifi]) || (wifiAdd[caWifi]?.[caC]||0)) : 0;
  const wingsCost = caWingsOn ? ((window.adminCfg?.wifiAdd?.wings)||1650) : 0;
  const baroD = (caBaroOn &amp;&amp; caProd!=='none') ? (_caBaroDisc ? (_caBaroDisc[caInet]||0) : (caBaroDisc[caInet]?.[caProd]||0)) : 0;
  const mobD  = (caMobOn  &amp;&amp; caProd!=='none') ? (_caMobDisc  ? (_caMobDisc[caInet]||0)  : (caMobDisc[caInet]?.[caProd]||0))  : 0;
  const homeMobD = (caMobOn &amp;&amp; caProd!=='none' &amp;&amp; caProd!=='p100') ? 3300 : 0;
  const caExtraStbFeeValCalc = (caExtraStbType!=='none' &amp;&amp; caExtraStbPop!=='none') ? (caExtraStbMode==='combo' ? _caExtFee.combo[caExtraStbPop] : _caExtFee.alone[caExtraStbPop]) : 0;
  const caAnsimCost = (caAnsimOn &amp;&amp; caInet!=='none') ? _ansimFee : 0;
  const total = Math.max(0, prodCost + inetCost + wifiCost + wingsCost + caStbFee + caExtraStbFeeValCalc + caAnsimCost - caComboDisc - baroD - mobD - homeMobD);

document.addEventListener('click', e=&gt;{
  const card = e.target.closest('[data-g^=&quot;ca-inet&quot;],[data-g^=&quot;ca-wifi&quot;],[data-g^=&quot;ca-wings&quot;],[data-g^=&quot;ca-stb&quot;],[data-g^=&quot;ca-extrastb&quot;]');  if(!card) return;
  const g = card.dataset.g;

  if(g==='ca-extrastb-pop'){
    document.querySelectorAll('[data-g=&quot;ca-extrastb-pop&quot;]').forEach(c=&gt;c.classList.remove('sel'));
    card.classList.add('sel');
    caExtraStbPop = card.dataset.pop;
    calcCa(); return;
  }
  if(g==='ca-extrastb'){
    document.querySelectorAll('[data-g=&quot;ca-extrastb&quot;]').forEach(c=&gt;c.classList.remove('sel'));
    card.classList.add('sel');
    caExtraStbType = card.dataset.type;

    calcCa(); return;
  }
  if(g==='ca-stb'){
    document.querySelectorAll('[data-g=&quot;ca-stb&quot;]').forEach(c=&gt;c.classList.remove('sel'));
    card.classList.add('sel');
    caStbFee = parseInt(card.dataset.fee)||0;
    caStbName = card.querySelector('.cname')?.textContent||'';
    calcCa(); return;
  }
  if(g==='ca-inet'){
    document.querySelectorAll('[data-g=&quot;ca-inet&quot;]').forEach(c=&gt;c.classList.remove('sel'));
    card.classList.add('sel'); caInet=id;

  }
  calcCa();
});

function buildCaText(){
  const C_label = {3:'3년', 2:'2년', 1:'1년', 0:'무약정'}[caC];
  let lines = [];
  lines.push('[SK브로드밴드 CA 요금 안내]');
  lines.push(`약정: ${C_label}`);
  lines.push('');

  // 예상 요금 상세 행들을 순서대로 읽어서 전송
  const rows = [
    { row: 'ca-rr-inet',     label: 'ca-rl-inet',    val: 'ca-r-inet' },
    { row: 'ca-rr-wifi',     label: 'ca-rl-wifi',    val: 'ca-r-wifi' },
    { row: 'ca-rr-wings',    label: null,             val: null,        fixedLabel: '윙즈', fixedVal: '+1,650원' },
    { row: null,             label: 'ca-rl-prod',     val: 'ca-r-prod' },
    { row: 'ca-rr-stb',      label: 'ca-rl-stb',     val: 'ca-r-stb' },
    { row: 'ca-rr-extrastb', label: 'ca-rl-extrastb',val: 'ca-r-extrastb' },
    { row: 'ca-rr-ansim',    label: null,             val: 'ca-r-ansim', fixedLabel: '안심서비스' },
    { row: 'ca-rr-combo',    label: null,             val: 'ca-r-combo',  fixedLabel: caMobOn ? '인터넷+TV 결합할인' : '인터넷+TV 우리집결합' },
    { row: 'ca-rr-baro',     label: null,             val: 'ca-r-baro',   fixedLabel: '바로할인' },
    { row: 'ca-rr-mob',      label: null,             val: 'ca-r-mob',    fixedLabel: 'SKT 휴대폰 결합' },
    { row: 'ca-rr-homemob',  label: null,             val: 'ca-r-homemob',fixedLabel: '요즘우리집결합' },
  ];

  rows.forEach(r =&gt; {
    const rowEl = r.row ? document.getElementById(r.row) : null;
    if (rowEl &amp;&amp; rowEl.style.display === 'none') return;
    const labelEl = r.label ? document.getElementById(r.label) : null;
    const valEl   = r.val ? document.getElementById(r.val) : null;
    const labelTxt = r.fixedLabel || (labelEl ? labelEl.textContent.trim() : '');
    const valTxt   = r.fixedVal || (valEl ? valEl.textContent.trim() : '');
    if (valTxt &amp;&amp; valTxt !== '—' &amp;&amp; valTxt !== '미선택' &amp;&amp; valTxt !== '미사용') {
      lines.push(`${labelTxt}: ${valTxt}`);
    }
  });

  lines.push('');
  const total = document.getElementById('ca-r-total')?.textContent.replace('원','').trim() || '—';
  lines.push(`💰 월 납부 예상: ${total}원`);

  return lines.join('\n');
}

function buildSkbText(){
  const C_label = {3:'3년', 2:'2년', 1:'1년', 0:'무약정'}[C];
  let lines = [];
  lines.push('[SK브로드밴드 요금 안내]');
  lines.push(`약정: ${C_label}`);
  lines.push('');

  // 예상 요금 상세 행들을 순서대로 읽어서 전송
  const rows = [
    { row: 'rr-inet',      label: 'rl-inet',      val: 'r-inet' },
    { row: 'rr-wifi',      label: 'rl-wifi',      val: 'r-wifi' },
    { row: 'rr-wings',     label: null,            val: 'r-wings',     fixedLabel: '윙즈' },
    { row: null,           label: 'rl-btv',        val: 'r-btv' },
    { row: null,           label: 'rl-stb',        val: 'r-stb' },
    { row: 'rr-extrastb',  label: 'rl-extrastb',  val: 'r-extrastb' },
    { row: 'rr-ansim',     label: null,            val: 'r-ansim',     fixedLabel: '안심서비스' },
    { row: 'rr-moving',    label: null,            val: 'rv-moving',   fixedLabel: 'B tv 무빙 STB 할인' },
    { row: 'rr-ibtv',      label: null,            val: 'rv-ibtv',     fixedLabel: (mobOn &amp;&amp; mobLines &gt; 0) ? '인터넷+TV 결합할인' : '인터넷+TV 우리집결합' },
    { row: 'rr-baro',      label: null,            val: 'rv-baro',     fixedLabel: '바로할인' },
    { row: 'rr-mob-inet',  label: null,            val: 'rv-mob-inet', fixedLabel: '요즘가족결합 인터넷' },
    { row: 'rr-mob-iptv',  label: null,            val: 'rv-mob-iptv', fixedLabel: '요즘우리집결합 IPTV 추가' },
  ];

  rows.forEach(r =&gt; {
    const rowEl = r.row ? document.getElementById(r.row) : null;
    if (rowEl &amp;&amp; rowEl.style.display === 'none') return;
    const labelEl = r.label ? document.getElementById(r.label) : null;
    const valEl   = document.getElementById(r.val);
    if (!valEl) return;
    const labelTxt = r.fixedLabel || (labelEl ? labelEl.textContent.trim() : '');
    const valTxt   = valEl.textContent.trim();
    if (valTxt &amp;&amp; valTxt !== '—' &amp;&amp; valTxt !== '미선택' &amp;&amp; valTxt !== '미사용') {
      lines.push(`${labelTxt}: ${valTxt}`);
    }
  });

  lines.push('');
  const total = document.getElementById('r-total')?.textContent.replace('원','').trim() || '—';
  lines.push(`💰 월 납부 예상: ${total}원`);

  // 고객 사은품
  if(!baroOn &amp;&amp; selInet !== 'none') {
    const tvKey = effectiveBtv() === 'none' ? 'none' : effectiveBtv();
    const amount = giftData[selInet]?.[tvKey];
    if(movingOn &amp;&amp; canSelectMoving()) {
      lines.push(`🎁 고객 사은품: 삼성 무빙스타일 TV (상품권 ${amount ? amount.toLocaleString()+'원' : '—'} 대신 선택)`);
    } else if(amount) {
      lines.push(`🎁 고객 사은품: ${amount.toLocaleString()}원 (상품권)`);
    }
  }

  return lines.join('\n');
}
&lt;/script&gt;

    ]},
  };

  // 변경 후: 스마트 3 고정
  const afterData = { periods: [
    { label:'54개월 미만',  fee_1st: 4400, fee_2nd: 2200 },
    { label:'54~60개월',   fee_1st: 2200, fee_2nd: 2200 },

  ]};

  // 변경 후: AI5 케어형 고정
  const ai5Data = { periods: [
    { label:'54개월 미만',  fee_1st: 4400, fee_2nd: 3850 },
    { label:'54~60개월',   fee_1st: 4400, fee_2nd: 3850 },
    { label:'60개월 초과',  fee_1st: 4400, fee_2nd: 3850 },
  ]};

  let vuGroup = null;
  let vuTab   = '1st';
  let vuMode  = 'valueup';  // 'valueup' | 'stb'

  window.vuSwitchMode = function(mode){
    vuMode = mode;
    document.querySelectorAll('#vu-mode-tabs .tab').forEach(t=&gt;{
      t.classList.toggle('on', t.dataset.vuMode === mode);
    });
    // 모드를 선택하면 콘텐츠 영역 표시
    const wrap = document.getElementById('vu-content-wrap');
    if(wrap) wrap.style.display = 'block';

    // 모드별 콘텐츠 토글
    const stbEl   = document.getElementById('vu-stb-content');
    const gigaEl  = document.getElementById('vu-giga-content');
    const wingsEl = document.getElementById('vu-wings-content');
    if(stbEl)   stbEl.style.display   = (mode === 'stb')     ? 'block' : 'none';
    if(gigaEl)  gigaEl.style.display  = (mode === 'valueup') ? 'block' : 'none';
    if(wingsEl) wingsEl.style.display = (mode === 'wings')   ? 'block' : 'none';

    // 모드 전환 시 그룹이 이미 선택돼 있으면 다시 렌더 (향후 모드별 다른 데이터 반영 가능)
    if(vuGroup) renderRows();
  };

  window.vuSelectGroup = function(group){
    vuGroup = group;
    document.querySelectorAll('.vu-group-card').forEach(c =&gt; c.classList.remove('sel'));
    document.querySelector(`.vu-group-card[data-group=&quot;${group}&quot;]`).classList.add('sel');

    document.getElementById('vu-placeholder').style.display = 'none';
    document.getElementById('vu-panel').style.display = 'block';

    // 변경 전 헤더
    const info = groupInfo[group];
    const hdr  = document.getElementById('vu-before-header');
    hdr.style.background = info.bg;
    hdr.style.color      = info.color;
    hdr.textContent      = `변경 전 · ${info.label}`;

    renderRows();
  };

  window.vuSwitchTab = function(tab){
    vuTab = tab;
    document.getElementById('vu-tab-1st').classList.toggle('on', tab === '1st');
    document.getElementById('vu-tab-2nd').classList.toggle('on', tab === '2nd');
    renderRows();
  };

  function fmtFee(fee, colorOverride){
    if(fee === 0) return `&lt;span class=&quot;vu-cmp-fee vu-cmp-zero&quot;&gt;0원&lt;/span&gt;`;

  function fmtAfter(fee){
    if(fee === 0) return `&lt;span class=&quot;vu-after-fee vu-after-zero&quot;&gt;0원&lt;/span&gt;`;
    return `&lt;span class=&quot;vu-after-fee&quot;&gt;${fee.toLocaleString()}원&lt;/span&gt;`;
  }

  function renderRows(){
    if(!vuGroup) return;
    const feeKey   = vuTab === '1st' ? 'fee_1st' : 'fee_2nd';
    const info     = groupInfo[vuGroup];
    const periods  = vuData[vuGroup].periods;
    const afterP   = afterData.periods;
    const ai5P     = ai5Data.periods;

    // 변경 전

    ).join('');

    // 변경 후: AI5 케어형
    document.getElementById('vu-ai5-rows').innerHTML = ai5P.map(p =&gt; {
      const fee = p[feeKey];
      const feeStr = fee === 0 ? '0원' : `${fee.toLocaleString()}원`;
      return `&lt;div class=&quot;vu-after-row&quot; style=&quot;border-bottom:1px solid #c4b5fd;&quot;&gt;
        &lt;span class=&quot;vu-after-label&quot; style=&quot;color:#7c3aed;&quot;&gt;${p.label}&lt;/span&gt;

      &lt;/div&gt;`;
    }).join('');
  }
})();

.badge{display:inline-block;padding:2px 7px;border-radius:4px;background:var(--btv-blue-light);color:var(--btv-blue-dark);font-size:10px;font-weight:700;letter-spacing:.3px}
.badge-yt{background:#FEE2E2;color:#B91C1C}
.badge-mp4{background:#DCFCE7;color:#15803D}
.card-action{flex:0 0 auto;width:36px;height:36px;border-radius:10px;background:var(--btv-blue);color:var(--white);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,100,255,.3)}
.card-action svg{width:18px;height:18px}
.video-list{display:grid;gap:14px;grid-template-columns:1fr}
.video-card{background:var(--white);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm);transition:transform .12s ease,box-shadow .12s ease;position:relative}
.video-card:active{transform:scale(.98);box-shadow:var(--shadow-md)}
.video-thumb{position:relative;padding-top:56.25%;background:linear-gradient(135deg,var(--btv-blue-light) 0%,#D6E4FF 100%);overflow:hidden}
.video-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.video-thumb::after{content:&quot;&quot;;position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 50%,rgba(0,0,0,.45) 100%)}
.play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;background:rgba(255,255,255,.95);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:2}
.play-icon svg{width:22px;height:22px;color:var(--btv-blue);margin-left:3px}
.video-type-pill{position:absolute;top:10px;right:10px;z-index:2;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px;background:rgba(0,0,0,.75);color:var(--white);display:flex;align-items:center;gap:4px}
.video-type-pill.yt{background:#DC2626}
.video-type-pill svg{width:10px;height:10px}
.video-body{padding:12px 14px 14px}
.video-title{font-size:14px;font-weight:600;color:var(--ink-900);line-height:1.4;margin-bottom:4px}
.video-meta{font-size:11px;color:var(--ink-500);display:flex;gap:6px;align-items:center}
.empty{text-align:center;padding:60px 20px;color:var(--ink-500)}
.empty svg{width:48px;height:48px;color:var(--ink-300);margin-bottom:8px}
.empty-title{font-size:14px;font-weight:600;color:var(--ink-700);margin-bottom:4px}
.empty-sub{font-size:12px}
.info-box{background:linear-gradient(135deg,#E6F0FF 0%,#F0F7FF 100%);border-radius:14px;padding:12px 14px;margin:16px 20px 0;font-size:12px;color:var(--ink-700);display:flex;gap:10px;align-items:flex-start}
.info-box svg{flex:0 0 18px;color:var(--btv-blue);margin-top:1px}
.info-box b{color:var(--btv-blue-dark)}
footer{text-align:center;padding:24px 20px 32px;font-size:11px;color:var(--ink-500);line-height:1.6}
footer a{color:var(--btv-blue);font-weight:500}
@media (min-width:640px){body{background:#ECF1F8}.header,.chips,main,.info-box,footer{max-width:480px;margin-left:auto;margin-right:auto}.header{border-radius:0 0 18px 18px}}
.fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

let activeTab = &quot;pdf&quot;;
let activeCategory = &quot;전체&quot;;
let searchTerm = &quot;&quot;;

const $ = (id) =&gt; document.getElementById(id);
function getList() { return activeTab === &quot;pdf&quot; ? pdfGuides : videoGuides; }

function getCats() {
  const list = getList();
  const cats = [&quot;전체&quot;, ...Array.from(new Set(list.map(g =&gt; g.c)))];
  const counts = list.reduce((a, g) =&gt; (a[g.c] = (a[g.c]||0)+1, a), {});
  counts[&quot;전체&quot;] = list.length;
  return { cats, counts };
}

function renderTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn =&gt; {
    const isActive = btn.dataset.tab === activeTab;
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });
  if (activeTab === &quot;pdf&quot;) {
    $('infoText').innerHTML = '각 가이드의 &lt;b&gt;다운로드 버튼&lt;/b&gt;을 누르면 SK브로드밴드 공식 가이드 페이지에서 PDF를 받을 수 있습니다.';
    $('srcLink').href = PDF_URL;
    $('search').placeholder = &quot;가이드 검색 (예: 리모컨, 와이파이)&quot;;
  } else {
    $('infoText').innerHTML = '카드를 누르면 &lt;b&gt;새 탭에서 영상이 바로 재생&lt;/b&gt;됩니다. (MP4 직접 재생 또는 YouTube 링크)';
    $('srcLink').href = VIDEO_URL;
    $('search').placeholder = &quot;영상 검색 (예: 셋톱박스, ZEM)&quot;;
  }
}

function renderChips() {
  const { cats, counts } = getCats();
  if (!cats.includes(activeCategory)) activeCategory = &quot;전체&quot;;
  $('chips').innerHTML = cats.map(cat =&gt; `
    &lt;button class=&quot;chip ${cat === activeCategory ? 'active' : ''}&quot; data-cat=&quot;${cat}&quot;&gt;
      ${cat}&lt;span class=&quot;chip-count&quot;&gt;${counts[cat]}&lt;/span&gt;
    &lt;/button&gt;
  `).join('');
  document.querySelectorAll('.chip').forEach(btn =&gt; {
    btn.addEventListener('click', () =&gt; {
      activeCategory = btn.dataset.cat;
      renderChips();
      renderContent();
      btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    });
  });
}

function renderContent() {
  const list = getList().filter(g =&gt; {
    const matchCat = activeCategory === &quot;전체&quot; || g.c === activeCategory;
    const matchSearch = !searchTerm || g.t.toLowerCase().includes(searchTerm.toLowerCase());
    return matchCat &amp;&amp; matchSearch;
  });

  const meta = $('resultMeta');
  const empty = $('empty');
  const area = $('contentArea');

  if (list.length === 0) {
    meta.textContent = &quot;&quot;;
    area.innerHTML = &quot;&quot;;
    empty.hidden = false;
    return;
  }
  empty.hidden = true;
  meta.textContent = `총 ${list.length}개의 ${activeTab === &quot;pdf&quot; ? &quot;가이드 PDF&quot; : &quot;동영상&quot;}`;

  if (activeTab === &quot;pdf&quot;) {
    area.className = &quot;card-list fade-in&quot;;
    area.innerHTML = list.map(g =&gt; `
      &lt;a class=&quot;card&quot; href=&quot;${PDF_URL}&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;&gt;
        &lt;div class=&quot;card-icon&quot; aria-hidden=&quot;true&quot;&gt;${ICONS[g.i] || ICONS.help}&lt;/div&gt;
        &lt;div class=&quot;card-body&quot;&gt;
          &lt;div class=&quot;card-title&quot;&gt;${g.t}&lt;/div&gt;
          &lt;div class=&quot;card-meta&quot;&gt;
            &lt;span class=&quot;badge&quot;&gt;PDF&lt;/span&gt;
            &lt;span&gt;${g.c} · 국문&lt;/span&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;card-action&quot; aria-label=&quot;다운로드&quot;&gt;
          &lt;svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2.5&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;&gt;&lt;path d=&quot;M12 15V3&quot;/&gt;&lt;path d=&quot;m7 10 5 5 5-5&quot;/&gt;&lt;path d=&quot;M5 21h14&quot;/&gt;&lt;/svg&gt;
        &lt;/div&gt;
      &lt;/a&gt;
    `).join('');
  } else {
    area.className = &quot;video-list fade-in&quot;;
    area.innerHTML = list.map(g =&gt; {
      const isYT = g.s === &quot;youtube&quot;;
      return `
        &lt;a class=&quot;video-card&quot; href=&quot;${g.u}&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot; aria-label=&quot;${g.t} 영상 재생&quot;&gt;
          &lt;div class=&quot;video-thumb&quot;&gt;
            &lt;img src=&quot;${g.th}&quot; alt=&quot;${g.t} 썸네일&quot; loading=&quot;lazy&quot; onerror=&quot;this.style.display='none'&quot;&gt;
            &lt;div class=&quot;video-type-pill ${isYT ? 'yt' : ''}&quot;&gt;
              ${isYT
                ? '&lt;svg viewBox=&quot;0 0 24 24&quot; fill=&quot;currentColor&quot;&gt;&lt;path d=&quot;M23.5 6.2a3 3 0 0 0-2.1-2.1C19.6 3.6 12 3.6 12 3.6s-7.6 0-9.4.5A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.8.5 9.4.5 9.4.5s7.6 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z&quot;/&gt;&lt;/svg&gt;'
                : '&lt;svg viewBox=&quot;0 0 24 24&quot; fill=&quot;currentColor&quot;&gt;&lt;path d=&quot;M8 5v14l11-7z&quot;/&gt;&lt;/svg&gt;'}
              ${isYT ? 'YouTube' : 'MP4'}
            &lt;/div&gt;
            &lt;div class=&quot;play-icon&quot;&gt;&lt;svg viewBox=&quot;0 0 24 24&quot; fill=&quot;currentColor&quot;&gt;&lt;path d=&quot;M8 5v14l11-7z&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;video-body&quot;&gt;
            &lt;div class=&quot;video-title&quot;&gt;${g.t}&lt;/div&gt;
            &lt;div class=&quot;video-meta&quot;&gt;
              &lt;span class=&quot;badge ${isYT ? 'badge-yt' : 'badge-mp4'}&quot;&gt;${isYT ? 'YouTube' : 'MP4'}&lt;/span&gt;
              &lt;span&gt;${g.c}&lt;/span&gt;
            &lt;/div&gt;
          &lt;/div&gt;
        &lt;/a&gt;
      `;
    }).join('');
  }
}

const searchInput = $('search');
const searchClear = $('searchClear');
searchInput.addEventListener('input', (e) =&gt; {
  searchTerm = e.target.value.trim();
  searchClear.classList.toggle('show', !!searchTerm);
  renderContent();
});
searchClear.addEventListener('click', () =&gt; {
  searchInput.value = &quot;&quot;;
  searchTerm = &quot;&quot;;
  searchClear.classList.remove('show');
  renderContent();
  searchInput.focus();
});

document.querySelectorAll('.tab-btn').forEach(btn =&gt; {
  btn.addEventListener('click', () =&gt; {
    if (activeTab === btn.dataset.tab) return;
    activeTab = btn.dataset.tab;
    activeCategory = &quot;전체&quot;;
    searchInput.value = &quot;&quot;;
    searchTerm = &quot;&quot;;
    searchClear.classList.remove('show');
    renderTabs();
    renderChips();
    renderContent();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

renderTabs();
renderChips();
renderContent();
&lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;
"></iframe>
</div>

<script>
(function(){
  const tabs    = document.querySelectorAll('.tab-btn');
  const frames  = {
    calc:  document.getElementById('frame-calc'),
    guide: document.getElementById('frame-guide'),
  };
  const loading = document.getElementById('loading');

  const STORAGE_KEY = 'skb-combined-active-tab';
  let active = localStorage.getItem(STORAGE_KEY) || 'calc';
  if (!frames[active]) active = 'calc';
  setActive(active, false);

  let loaded = 0;
  function onFrameLoad(){
    loaded++;
    if (loaded >= 1) loading.classList.add('hidden');
  }
  frames.calc.addEventListener('load',  onFrameLoad);
  frames.guide.addEventListener('load', onFrameLoad);

  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.tab;
      if (name === active) return;
      setActive(name, true);
    });
  });

  function setActive(name, animate){
    active = name;
    localStorage.setItem(STORAGE_KEY, name);
    tabs.forEach(b => {
      const isActive = b.dataset.tab === name;
      b.classList.toggle('active', isActive);
      b.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
    Object.entries(frames).forEach(([k, f]) => {
      f.classList.toggle('active', k === name);
    });
    document.querySelector('meta[name="theme-color"]')
      .setAttribute('content', name === 'calc' ? '#E8001C' : '#0064FF');
  }
})();
</script>
